version: 1
description: |
  Industries whitelist + synonym map for vendor classification UI.
  Anything not in synonym/canonical drops at normalize-time.

  Snowglobe 2026-05-25 — we stopped trusting raw LLM `industries[]` output
  (Gemini/Ollama hallucinated "aerospace" for civilian MRO companies).
  Now: LLM proposes → normalizer filters → only canonical tags persist.

# Canonical tags surfaced in UI badges. Lowercase snake_case for stability.
canonical:
  - defense_industrial
  - weapons_manufacturing
  - ammunition_manufacturing
  - missiles_rockets
  - military_aerospace
  - naval_systems
  - vehicles_armor
  - body_armor
  - c4isr
  - military_cyber
  - military_training
  - cbrn
  - law_enforcement
  - homeland_security
  - dual_use_electronics
  - dual_use_materials
  - defense_software

# raw → canonical mapping. Keys lowercased and trimmed before match.
