version: 2
description: |
  Military / defense scope taxonomy for Autocrawl agentic vendor classifier.
  v2 (2026-05-25): word-boundary matching, global negative keywords, and
  per-category negative_context to suppress civilian false positives.

  Match logic:
    - Each positive keyword matches via `\b<kw>\b` regex (word boundary).
    - global negative_keywords abort the whole classification (vendor → not military).
    - Per-category negative_context disables a category if present in the same
      haystack as a positive hit (e.g. "drone" + "racing drone" → ignore c4isr).

min_match_score: 0.10
hard_reject_below_score: 0.05
weak_signal_score: 0.40            # 2026-05-25 rescaled — score < this AND single category → require explicit military context. With max_practical_weight=4.0, 0.40 ≈ "less than 2 weighted categories"
max_practical_weight: 4.0          # 2026-05-25 — cap denominator. Specialist vendor (1 weighted category) → 25%, 2 → 50%, 3 → 75%, 4+ → 100%. Comprehensive defense prime (SAAB-tier) caps at 100%.
explicit_military_context:
  - military
  - defense
  - defence
  - armed forces
  - police
  - swat
  - tactical
  - combat
  - warfare
  - law enforcement
  - special forces

negative_keywords_global:
  # Vendor scopes that should never qualify as military regardless of accidental
  # keyword hits. Substring match (rakus) intentional — false positives here
  # are cheaper than civilian vendor leaks into the military feed.
  - cosmetic
  - lipstick
  - mascara
  - skincare
  - perfume
  - fragrance
  - fashion apparel
  - food and beverage
  - food & beverage
  - restaurant
  - hospitality industry
  - real estate
  - online dating
  - gaming entertainment
  - casino
  - children toy
  - kids toy
  - pet food
  - veterinary
  - pet care

