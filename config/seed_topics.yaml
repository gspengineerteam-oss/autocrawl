# Seed topics for dynamic expo discovery.
# Each run, the LLM expands these into 8-15 query variations
# with current_date context and dedupes against history.
#
# Order matters loosely — earlier topics get priority weight.

topics:
  - name: "security_defense"
    label: "Security & Defense"
    keywords:
      - "security defense expo"
      - "defense exhibition"
      - "homeland security expo"
      - "military equipment trade show"
      - "national security conference"
    regions: ["global", "Asia", "Europe", "Middle East", "Americas"]
    weight: 1.0

  - name: "law_enforcement"
    label: "Law Enforcement & Police"
    keywords:
      - "police equipment expo"
      - "law enforcement technology"
      - "tactical gear trade show"
      - "police innovation conference"
    regions: ["global", "Asia", "Americas"]
    weight: 0.9

  - name: "border_control"
    label: "Border Control & Customs"
    keywords:
      - "border control expo"
      - "border security technology"
      - "customs technology conference"
      - "immigration technology expo"
    regions: ["global"]
    weight: 0.8

  - name: "cybersecurity"
    label: "Cybersecurity"
    keywords:
      - "cybersecurity expo"
      - "cyber defense conference"
      - "information security trade show"
      - "infosec summit"
    regions: ["global", "Asia", "Europe", "Americas"]
    weight: 0.95

  - name: "surveillance_isr"
    label: "Surveillance, ISR, Drones"
    keywords:
      - "surveillance technology expo"
      - "drone defense conference"
      - "ISR exhibition"
      - "unmanned systems expo"
    regions: ["global"]
    weight: 0.85

  - name: "critical_infrastructure"
    label: "Critical Infrastructure Protection"
    keywords:
      - "critical infrastructure security"
      - "SCADA security conference"
      - "energy security expo"
      - "industrial control security"
    regions: ["global"]
    weight: 0.7

